rules:
  - id: "adr-status-accepted-in-prs"
    name: "Mark new ADRs as Accepted in PRs"
    type: llm
    severity: warning
    category: "patterns"
    message: "Set status to Accepted when adding a new ADR in a PR because the PR records a decision that was already made."
    llm:
      prompt: "Set status to Accepted when adding a new ADR in a PR because the PR records a decision that was already made."
  - id: "adr-required-sections"
    name: "Include the standard ADR sections"
    type: llm
    severity: warning
    category: "patterns"
    message: "Write ADRs with Context, Decision or Decisions, Consequences, Alternatives considered, and Revisit when, plus References when needed."
    llm:
      prompt: "Write ADRs with Context, Decision or Decisions, Consequences, Alternatives considered, and Revisit when, plus References when needed."
  - id: "allow-decision-or-decisions-heading"
    name: "Use Decision or Decisions heading"
    type: llm
    severity: warning
    category: "style"
    message: "Use either Decision or Decisions for the ADR section title because both are valid in this repo."
    llm:
      prompt: "Use either Decision or Decisions for the ADR section title because both are valid in this repo."
  - id: "adr-file-naming-sequence"
    name: "Use numbered ADR file names"
    type: llm
    severity: warning
    category: "style"
    message: "Name ADR files as decisions/NNN-kebab-case.md with the next unused number and never reuse an ADR number."
    llm:
      prompt: "Name ADR files as decisions/NNN-kebab-case.md with the next unused number and never reuse an ADR number."
  - id: "fenced-code-blocks-need-language"
    name: "Tag fenced code blocks with a language"
    type: llm
    severity: warning
    category: "style"
    message: "Add a language tag to every fenced code block, such as text, bash, or console."
    llm:
      prompt: "Add a language tag to every fenced code block, such as text, bash, or console."
  - id: "escape-pipes-in-markdown-tables"
    name: "Escape pipe characters in tables"
    type: llm
    severity: warning
    category: "style"
    message: "Escape or encode pipe characters inside markdown table cells so the table keeps the right column count."
    llm:
      prompt: "Escape or encode pipe characters inside markdown table cells so the table keeps the right column count."
  - id: "use-github-capitalization"
    name: "Capitalize GitHub consistently"
    type: llm
    severity: warning
    category: "style"
    message: "Write GitHub with a capital H in docs and runbooks."
    llm:
      prompt: "Write GitHub with a capital H in docs and runbooks."
  - id: "use-cross-platform-commands-in-docs"
    name: "Use cross-platform commands in docs"
    type: llm
    severity: warning
    category: "patterns"
    message: "Use commands that work on both macOS and Linux, or provide both command variants."
    llm:
      prompt: "Use commands that work on both macOS and Linux, or provide both command variants."
  - id: "include-pr-number-in-adr-references"
    name: "Reference concrete PR numbers"
    type: llm
    severity: warning
    category: "patterns"
    message: "When an ADR cites a related PR, include the full repo and PR number like owner/repo#123."
    llm:
      prompt: "When an ADR cites a related PR, include the full repo and PR number like owner/repo#123."
  - id: "document-conditional-claims-clearly"
    name: "Scope conditional behavior clearly"
    type: llm
    severity: warning
    category: "patterns"
    message: "Do not state behavior as always true when it depends on a feature or phase that is not always active."
    llm:
      prompt: "Do not state behavior as always true when it depends on a feature or phase that is not always active."
  - id: "state-concurrency-mitigation-explicitly"
    name: "Explain race handling explicitly"
    type: llm
    severity: warning
    category: "performance"
    message: "When docs describe concurrent work in shared paths, state the conflict model and the mitigation clearly."
    llm:
      prompt: "When docs describe concurrent work in shared paths, state the conflict model and the mitigation clearly."
  - id: "preserve-canonical-literals-in-doc-examples"
    name: "Keep exact field and stage literals"
    type: llm
    severity: warning
    category: "patterns"
    message: "Use the exact canonical field names and stage values in docs examples instead of paraphrasing them."
    llm:
      prompt: "Use the exact canonical field names and stage values in docs examples instead of paraphrasing them."
  - id: "document-error-to-http-mapping-with-exceptions"
    name: "Document error to HTTP mapping with exceptions"
    type: llm
    severity: warning
    category: "patterns"
    message: "When documenting API error behavior, list the error class to HTTP status mapping and any route-level exceptions."
    llm:
      prompt: "When documenting API error behavior, list the error class to HTTP status mapping and any route-level exceptions."
