helm_version: '0'
product:
  slug: helm
  name: Helm

issue_tracker:
  provider: github_projects
  org: lhpaul
  project_number: 3
  custom_field_name: Helm Stage

code_repos:
  - url: https://github.com/lhpaul/helm
    default_branch: develop
    role: app

knowledge_repo:
  url: https://github.com/lhpaul/helm-knowledge
  default_branch: main

workflow:
  stages_enabled:
    - discovery
    - spec-draft
    - spec-ready
    - plan-draft
    - plan-ready
    - in-development
    - code-review
    - remediation
    - merged
    - released
  # final_stage default is released (ADR-032): impl merge → merged, ship → released
  designer_gate: skip
  qa_gate: skip

review:
  external:
    provider: haystack
    haystack:
      major_is_blocking: false
      poll_interval_sec: 15
      timeout_sec: 120
  loop:
    max_cycles: 5
    adjudication:
      enabled: true
    stop_rule:
      no_progress_cycles: 2

specialists:
  spec-writer:
    runtime: claude_code
    model: sonnet
  plan-writer:
    runtime: claude_code
    model: sonnet
  implementer:
    runtime: claude_code
    model: opus
  code-reviewer:
    runtime: claude_code
    model: sonnet
  security-reviewer:
    runtime: claude_code
    model: sonnet
  test-reviewer:
    runtime: claude_code
    model: sonnet
  spec-remediator:
    runtime: claude_code
    model: sonnet
  plan-remediator:
    runtime: claude_code
    model: sonnet
  code-remediator:
    runtime: claude_code
    model: sonnet
  review-adjudicator:
    runtime: claude_code
    model: sonnet
